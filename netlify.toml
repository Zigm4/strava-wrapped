# All-in-one Netlify deploy: the static site AND the token-exchange function,
# so there is no CORS and the Strava client secret lives only in Netlify.
#
# Set these in Netlify (Site settings > Environment variables):
#   VITE_STRAVA_CLIENT_ID   your Strava Client ID (public)
#   STRAVA_CLIENT_SECRET    your Strava Client Secret (keep secret)

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # the front end calls the function on the same origin, so no CORS is needed
  VITE_TOKEN_EXCHANGE_URL = "/.netlify/functions/strava-token"

[functions]
  node_bundler = "esbuild"

# SPA : une seule page, pas de routes serveur côté front.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité pour tout le site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    # CSP : tout en self, sauf les appels directs à Strava et le géocodage Nominatim.
    # (Les polices sont auto-hébergées, donc pas de fonts.googleapis.com.)
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://www.strava.com https://nominatim.openstreetmap.org; font-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# Assets hashés par Vite = immuables : cache long.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
