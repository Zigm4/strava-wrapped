    <!-- Icônes (PNG + Apple, en plus du SVG data-uri pour les navigateurs qui le gèrent) -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Aperçu de lien (Open Graph / Twitter). Les URLs d'image sont relatives : elles
         marchent sur Slack/Discord/WhatsApp/iMessage. Pour Twitter/Facebook, remplace-les
         par l'URL absolue de ton domaine (ex. https://strava-wrapped.netlify.app/og-image.png). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Strava Wrapped" />
    <meta property="og:title" content="Strava Wrapped · ta story mensuelle" />
    <meta property="og:description" content="Transforme ton mois ou ton année Strava en une carte prête à poster : distance, dénivelé, records, spot préféré. 100% dans ton navigateur." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Strava Wrapped · ta story mensuelle" />
    <meta name="twitter:description" content="Ton mois Strava en une story qui claque. 100% dans ton navigateur, rien n'est stocké." />
